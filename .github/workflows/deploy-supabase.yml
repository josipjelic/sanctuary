name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          missing=0
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing repository secret SUPABASE_ACCESS_TOKEN. Create a personal access token at https://supabase.com/dashboard/account/tokens then: gh secret set SUPABASE_ACCESS_TOKEN"
            missing=1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::Missing repository secret SUPABASE_PROJECT_ID (project Reference ID). Run: gh secret set SUPABASE_PROJECT_ID"
            missing=1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing repository secret SUPABASE_DB_PASSWORD (Postgres password from Supabase → Settings → Database). Run: gh secret set SUPABASE_DB_PASSWORD"
            missing=1
          fi
          exit "$missing"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.4

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
