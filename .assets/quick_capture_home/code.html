<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(83, 98, 83, 0.1); }

<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-full bg-[#f9f9f8]/70 backdrop-blur-xl flex justify-between items-center px-8 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Calm user profile portrait in soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6I5zy-gVxRySJ1hnGhvNqfHRZXyX9d3dq0c6MtVd8uKDIQYye0H3cPesCaPYSxUIVXzDTMbdePvhuSXv0NgrPFKlk_PjpjG7v4LwSg2pRbvepOtILxluZhg-Too7-7smpiZfBlvzmF_rC73GDuDzqJidUUViC5h1-uVkWKR4qjiahMA_MfZpt2NOXKN8wOW7Gz5hsAtpHLCsIIhYnJKYrTfynuM51zJvgYBi2NZ_smP03BYaWLSSWGpL1KABj7JcC_mEaQJrOzk0"/>
</div>
<span class="text-2xl font-bold font-headline text-[#536253] tracking-tighter">Sanctuary</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#f1f4f3] transition-all duration-500 text-[#536253]">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-32">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Contextual Text -->
<div class="mb-24 text-center">
<h1 class="font-headline text-5xl font-extrabold text-on-surface tracking-tighter mb-4">Speak your mind.</h1>
<p class="text-secondary text-lg font-medium opacity-60">Your thoughts are safe here.</p>
</div>
<!-- Voice Capture Component -->
<div class="relative group cursor-pointer">
<!-- Decorative Glow -->
<div class="absolute inset-0 bg-primary-container rounded-full blur-3xl opacity-20 group-hover:opacity-40 transition-opacity duration-700"></div>
<!-- Pulse Rings -->
<div class="absolute inset-0 rounded-full border-2 border-primary-container/30 animate-pulse-slow"></div>
<!-- Main Record Button -->
<button class="relative w-64 h-64 bg-primary rounded-full flex items-center justify-center shadow-[0_24px_48px_rgba(83,98,83,0.15)] hover:scale-95 transition-all duration-500 ease-[cubic-bezier(0.05,0.7,0.1,1)]">
<span class="material-symbols-outlined text-on-primary text-7xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Suggestion / History Hint -->
<div class="mt-24 w-full">
<div class="bg-surface-container-low rounded-xl p-8 flex items-center justify-between group hover:bg-surface-container transition-all duration-500">
<div class="flex items-center gap-4">
<div class="p-3 bg-surface-container-lowest rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="history">history</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface">Recent Thoughts</p>
<p class="text-xs text-secondary">3 recordings today</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary opacity-40 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center bg-[#f9f9f8]/80 backdrop-blur-2xl py-4 pb-8 px-4 rounded-t-[3rem] shadow-[0_-8px_32px_rgba(0,0,0,0.04)]">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center bg-[#536253] text-[#f9f9f8] rounded-full px-6 py-2 transition-all duration-600" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label text-[11px] font-medium tracking-wide uppercase">Home</span>
</a>
<!-- Inbox -->
<a class="flex flex-col items-center justify-center text-[#576165] px-6 py-2 hover:bg-[#e3e9e8] rounded-full transition-all" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="all_inbox">all_inbox</span>
<span class="font-label text-[11px] font-medium tracking-wide uppercase">Inbox</span>
</a>
<!-- Library -->
<a class="flex flex-col items-center justify-center text-[#576165] px-6 py-2 hover:bg-[#e3e9e8] rounded-full transition-all" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="subscriptions">subscriptions</span>
<span class="font-label text-[11px] font-medium tracking-wide uppercase">Library</span>
</a>

<a class="flex flex-col items-center justify-center text-[#576165] px-6 py-2 hover:bg-[#e3e9e8] rounded-full transition-all" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="person">person</span>
<span class="font-label text-[11px] font-medium tracking-wide uppercase">Profile</span>
</a>
