name: Preview Update

on:
  push:
    branches:
      - main

jobs:
  publish_update:
    name: Publish Preview Update
    type: update
    params:
      channel: preview
      message: ${{ github.event.head_commit.message }}

  notify_slack:
    name: Notify Slack
    needs: [publish_update]
    type: slack
    environment: preview
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      payload:
        blocks:
          - type: header
            text:
              type: plain_text
              text: Preview update ready
          - type: section
            text:
              type: mrkdwn
              text: "*Commit*\n${{ github.event.head_commit.message }}"
          - type: section
            fields:
              - type: mrkdwn
                text: "*Branch*\n`${{ github.ref_name }}`"
              - type: mrkdwn
                text: "*Channel*\n`preview`"
          - type: section
            text:
              type: mrkdwn
              # slug=sanctuary targets the dev client (not Expo Go); default slug=exp breaks with our runtimeVersion + native modules.
              text: '<https://qr.expo.dev/eas-update?projectId=cd70b552-8a0a-4d7e-9587-e43e30776839&groupId=${{ needs.publish_update.outputs.first_update_group_id }}&slug=sanctuary|Open preview (QR)>\n<https://expo.dev/accounts/context.hr/projects/sanctuary/updates|View updates on expo.dev>\n*Dev build required* (`eas build --profile development`, install on device). *Expo Go* will open but stay on the loading screen — runtime / native code does not match this OTA.'
          - type: context
            elements:
              - type: mrkdwn
                text: Internal preview profile installs can skip the QR; open the installed app and it pulls channel preview on launch.
