name: Preview Update

on:
  push:
    branches:
      - main

jobs:
  publish_update:
    name: Publish Preview Update
    type: update
    params:
      channel: preview
      message: ${{ github.event.head_commit.message }}

  notify_slack:
    name: Notify Slack
    needs: [publish_update]
    type: slack
    environment: preview
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      payload:
        blocks:
          - type: header
            text:
              type: plain_text
              text: Preview update ready
          - type: section
            text:
              type: mrkdwn
              text: "*Commit*\n${{ github.event.head_commit.message }}"
          - type: section
            fields:
              - type: mrkdwn
                text: "*Branch*\n`${{ github.ref_name }}`"
              - type: mrkdwn
                text: "*Channel*\n`preview`"
              - type: mrkdwn
                text: "*SHA*\n`${{ substring(github.sha, 0, 7) }}`"
          - type: section
            text:
              type: mrkdwn
              # Tap-to-open on phone (Slack desktop often cannot handle exp://).
              text: '<exp://u.expo.dev/cd70b552-8a0a-4d7e-9587-e43e30776839/group/${{ needs.publish_update.outputs.first_update_group_id }}|Open preview>\n`exp://u.expo.dev/cd70b552-8a0a-4d7e-9587-e43e30776839/group/${{ needs.publish_update.outputs.first_update_group_id }}`\n<https://expo.dev/accounts/context.hr/projects/sanctuary/updates|expo.dev — Updates> (HTTPS if exp:// is not clickable)'
          - type: context
            elements:
              - type: mrkdwn
                text: If one group link works and another hangs, compare Runtime version and platforms on expo.dev for both groups — or a bad JS bundle on that commit. Desktop Slack usually needs the raw exp URL copied to the device.
