name: Preview Update

on:
  push:
    branches:
      - main

jobs:
  publish_update:
    name: Publish Preview Update
    type: update
    params:
      environment: preview
      branch: preview
      message: ${{ github.event.head_commit.message }}

  notify_slack:
    name: Notify Slack
    needs: [publish_update]
    type: slack
    environment: preview
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      payload:
        blocks:
          - type: header
            text:
              type: plain_text
              text: Preview update ready
          - type: section
            text:
              type: mrkdwn
              text: "*Commit*\n${{ github.event.head_commit.message }}"
          - type: section
            fields:
              - type: mrkdwn
                text: "*Branch*\n`${{ github.ref_name }}`"
              - type: mrkdwn
                text: "*Channel*\n`preview`"
          - type: section
            text:
              type: mrkdwn
              text: "<exp://u.expo.dev/cd70b552-8a0a-4d7e-9587-e43e30776839/group/${{ needs.publish_update.outputs.first_update_group_id }}|Open in Expo Go>\n`exp://u.expo.dev/cd70b552-8a0a-4d7e-9587-e43e30776839/group/${{ needs.publish_update.outputs.first_update_group_id }}`"
          - type: context
            elements:
              - type: mrkdwn
                text: Beta testers can open the link on a device with Expo Go or your dev client.
