name: Preview Update

on:
  push:
    branches:
      - main

jobs:
  publish_update:
    name: Publish Preview Update
    type: update
    params:
      channel: preview
      message: ${{ github.event.head_commit.message }}

  notify_slack:
    name: Notify Slack
    needs: [publish_update]
    type: slack
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: "New Preview Update | ${{ github.event.head_commit.message }} | exp://u.expo.dev/cd70b552-8a0a-4d7e-9587-e43e30776839/group/${{ needs.publish_update.outputs.first_update_group_id }}"
