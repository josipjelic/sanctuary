name: Preview Build

on:
  push:
    branches:
      - main

jobs:
  build_ios:
    name: Build iOS (Preview)
    type: build
    params:
      platform: ios
      profile: preview

  build_android:
    name: Build Android (Preview)
    type: build
    params:
      platform: android
      profile: preview

  notify_slack:
    name: Notify Slack
    needs: [build_ios, build_android]
    type: slack
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      payload:
        blocks:
          - type: header
            text:
              type: plain_text
              text: "New Preview Build Ready"
          - type: section
            fields:
              - type: mrkdwn
                text: "*Version:*\n${{ needs.build_ios.outputs.app_version }}"
              - type: mrkdwn
                text: "*Branch:*\n${{ github.ref_name }}"
          - type: section
            fields:
              - type: mrkdwn
                text: "*iOS:*\nhttps://expo.dev/builds/${{ needs.build_ios.outputs.build_id }}"
              - type: mrkdwn
                text: "*Android:*\nhttps://expo.dev/builds/${{ needs.build_android.outputs.build_id }}"
