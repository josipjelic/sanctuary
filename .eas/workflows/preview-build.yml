name: Preview Update

on:
  push:
    branches:
      - main

jobs:
  publish_update:
    name: Publish Preview Update
    type: update
    params:
      channel: preview
      message: ${{ github.event.head_commit.message }}

  notify_slack:
    name: Notify Slack
    needs: [publish_update]
    type: slack
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      payload:
        blocks:
          - type: header
            text:
              type: plain_text
              text: "New Preview Update Ready"
          - type: section
            text:
              type: mrkdwn
              text: "${{ github.event.head_commit.message }}"
          - type: section
            fields:
              - type: mrkdwn
                text: "*Branch:*\n${{ github.ref_name }}"
              - type: mrkdwn
                text: "*Update:*\nhttps://expo.dev/accounts/context.hr/projects/sanctuary/updates/${{ needs.publish_update.outputs.first_update_group_id }}"
